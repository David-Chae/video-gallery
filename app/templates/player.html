<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ video_name }}</title>

  <link rel="stylesheet" href="/static/style.css" />

  <style>
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
	
	.top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .back-link {
      color: var(--subtext);
      text-decoration: none;
      font-size: 14px;
    }

    .back-link:hover {
      color: var(--text);
    }

    .player-box {
      background: #000;
      padding: 16px;
      border-radius: 12px;
    }

    .video-title {
      margin: 0 0 12px 0;
      font-size: 18px;
      word-break: break-all;
    }

    video {
      width: 100%;
      max-height: 80vh;
      background: #000;
      border-radius: 8px;
    }

    .debug {
      margin-top: 10px;
      font-size: 12px;
      color: var(--subtext);
      word-break: break-all;
    }
  </style>
</head>

<body>
  <div class="container">
  
	<!-- 상단 바 -->
    <div class="top-bar">
      <a href="/" class="back-link">← 뒤로</a>
      <button id="theme-toggle">🌙 Dark</button>
    </div>

    <!-- 플레이어 -->
    <div class="player-box">
      <h2 class="video-title">{{ video_name }}</h2>

      <video
        src="{{ video_url }}"
        controls
        preload="metadata"
        playsinline
      >
        브라우저가 이 비디오를 지원하지 않습니다.
      </video>
    </div>

    <!-- 디버그용 (필요 없으면 삭제) -->
    <div class="debug">
      {{ video_url }}
    </div>

  </div>
  <!-- 테마 스크립트 -->
  <script>
    const body = document.body;
    const toggleBtn = document.getElementById("theme-toggle");

    function applyTheme(theme) {
      if (theme === "light") {
        body.classList.add("light");
        toggleBtn.textContent = "🌞 Light";
      } else {
        body.classList.remove("light");
        toggleBtn.textContent = "🌙 Dark";
      }
    }

    const savedTheme = localStorage.getItem("theme") || "dark";
    applyTheme(savedTheme);

    toggleBtn.addEventListener("click", () => {
      const newTheme = body.classList.contains("light") ? "dark" : "light";
      localStorage.setItem("theme", newTheme);
      applyTheme(newTheme);
    });
  </script>
</body>
</html>
